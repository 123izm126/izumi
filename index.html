<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target Challenge Gold - Final</title>
    <style>
        :root {
            --primary: #38bdf8;
            --accent: #fb7185;
            --warning: #fbbf24;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #0f172a;
        }

        /* UI表示 */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .stat-group {
            pointer-events: auto; /* ここも当たり判定の計算に使うため明示 */
        }

        .stat {
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(15, 23, 42, 0.8);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            display: inline-block;
            min-width: 100px;
            margin-bottom: 5px;
        }

        #pause-btn {
            pointer-events: auto;
            background: #334155;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            height: fit-content;
        }

        #central-countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12rem;
            font-weight: 900;
            color: var(--warning);
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(7, 10, 20, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            text-align: center;
        }

        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary); }
        
        .mode-container { display: flex; gap: 20px; margin-top: 20px; }
        .mode-card {
            background: #1e293b; padding: 20px; border-radius: 16px;
            border: 2px solid transparent; cursor: pointer; width: 140px;
            transition: 0.2s;
        }
        .mode-card:hover { border-color: var(--primary); background: #334155; }

        .target {
            position: absolute;
            width: 60px; height: 60px;
            background: radial-gradient(circle, var(--accent) 10%, #be123c 90%);
            border-radius: 50%; border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.4);
            z-index: 10;
        }

        .hidden { display: none !important; }
        .ping { animation: ping-anim 0.5s ease-out forwards; }
        @keyframes ping-anim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
        .minus-score { color: var(--danger); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui" class="hidden">
        <div id="left-ui" class="stat-group">
            <div class="stat">Time: <span id="timer">60</span>s</div><br>
            <div class="stat">Score: <span id="score">0</span></div>
        </div>
        <button id="pause-btn">一時停止</button>
    </div>

    <div id="central-countdown"></div>

    <div id="menu-overlay" class="overlay">
        <h1 id="title">Target Challenge</h1>
        <p id="message">ミスは-50点！UIを避けて出現します</p>
        <div class="mode-container">
            <div class="mode-card" id="mode-cursor">
                <h3>カーソル</h3>
                <p>5秒表示<br>間隔: 0.8秒</p>
            </div>
            <div class="mode-card" id="mode-tap">
                <h3>タップ</h3>
                <p>2秒表示<br>間隔: 0.5秒</p>
            </div>
        </div>
    </div>

    <div id="pause-overlay" class="overlay hidden">
        <h1>PAUSED</h1>
        <div style="display:flex; flex-direction:column; gap:15px; margin-top:20px;">
            <button id="resume-btn" style="padding:12px 40px; background:var(--primary); border:none; color:white; border-radius:30px; font-weight:bold; cursor:pointer;">再開する</button>
            <button id="back-btn" style="padding:12px 40px; background:#475569; border:none; color:white; border-radius:30px; font-weight:bold; cursor:pointer;">タイトルへ</button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('game-container');
    const scoreElement = document.getElementById('score');
    const timerElement = document.getElementById('timer');
    const centralCountdown = document.getElementById('central-countdown');
    const pauseBtn = document.getElementById('pause-btn');
    const leftUi = document.getElementById('left-ui');
    const menuOverlay = document.getElementById('menu-overlay');
    const pauseOverlay = document.getElementById('pause-overlay');
    const ui = document.getElementById('ui');

    let score = 0;
    let timeLeft = 60;
    let gameActive = false;
    let isPaused = false;
    let targetLifeTime = 5000;
    let spawnRate = 800; 
    let spawnTimer, clockTimer;

    window.initGame = (mode) => {
        if (mode === 'cursor') {
            targetLifeTime = 5000;
            spawnRate = 800;
            container.style.cursor = 'crosshair';
        } else {
            targetLifeTime = 2000;
            spawnRate = 500; // タップモードは間隔を短く
            container.style.cursor = 'default';
        }
        
        score = 0;
        timeLeft = 60;
        updateScore(0);
        timerElement.textContent = timeLeft;
        menuOverlay.classList.add('hidden');
        ui.classList.remove('hidden');
        startGameLoop();
    };

    function startGameLoop() {
        gameActive = true;
        isPaused = false;
        if(spawnTimer) clearInterval(spawnTimer);
        if(clockTimer) clearInterval(clockTimer);

        spawnTimer = setInterval(() => {
            if (gameActive && !isPaused) createTarget();
        }, spawnRate);

        clockTimer = setInterval(() => {
            if (gameActive && !isPaused) {
                timeLeft--;
                timerElement.textContent = timeLeft;
                if (timeLeft <= 10 && timeLeft > 0) showCentralCountdown(timeLeft);
                if (timeLeft <= 0) endGame();
            }
        }, 1000);
    }

    function createTarget() {
        const target = document.createElement('div');
        target.classList.add('target');
        const targetSize = 60;
        const margin = 20;
        
        // 避けるべきUI要素のリスト
        const rectsToAvoid = [
            leftUi.getBoundingClientRect(),
            pauseBtn.getBoundingClientRect()
        ];
        
        let x, y, isOverlapping, attempts = 0;
        do {
            x = Math.random() * (window.innerWidth - targetSize - 40) + 20;
            y = Math.random() * (window.innerHeight - targetSize - 40) + 20;
            
            isOverlapping = rectsToAvoid.some(rect => {
                return (x < rect.right + margin && x + targetSize > rect.left - margin &&
                        y < rect.bottom + margin && y + targetSize > rect.top - margin);
            });
            attempts++;
        } while (isOverlapping && attempts < 15);

        target.style.left = `${x}px`;
        target.style.top = `${y}px`;

        target.animate([
            { transform: 'scale(1)', opacity: 1 },
            { transform: 'scale(0.5)', opacity: 0 }
        ], { duration: targetLifeTime });

        const timeout = setTimeout(() => {
            if (target.parentNode) {
                target.remove();
                if (gameActive && !isPaused) updateScore(-50);
            }
        }, targetLifeTime);

        const hitHandler = (e) => {
            if (!gameActive || isPaused) return;
            e.preventDefault();
            clearTimeout(timeout);
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            createExplosion(clientX, clientY);
            target.remove();
            updateScore(100);
        };

        target.addEventListener('mousedown', hitHandler);
        target.addEventListener('touchstart', hitHandler, {passive: false});
        container.appendChild(target);
    }

    function updateScore(points) {
        score += points;
        scoreElement.textContent = score;
        if (points < 0) {
            scoreElement.classList.add('minus-score');
            setTimeout(() => scoreElement.classList.remove('minus-score'), 300);
        }
    }

    function showCentralCountdown(num) {
        centralCountdown.textContent = num;
        centralCountdown.classList.remove('ping');
        void centralCountdown.offsetWidth;
        centralCountdown.classList.add('ping');
    }

    function endGame() {
        gameActive = false;
        clearInterval(spawnTimer);
        clearInterval(clockTimer);
        document.querySelectorAll('.target').forEach(t => t.remove());
        ui.classList.add('hidden');
        pauseOverlay.classList.add('hidden');
        menuOverlay.classList.remove('hidden');
        document.getElementById('title').textContent = "Finish!";
        document.getElementById('message').textContent = `最終スコア: ${score}`;
    }

    function createExplosion(x, y) {
        for (let i = 0; i < 10; i++) {
            const p = document.createElement('div');
            p.style.cssText = `position:absolute; width:6px; height:6px; background:var(--accent); border-radius:50%; left:${x}px; top:${y}px; pointer-events:none; z-index:11;`;
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 80;
            p.animate([{ transform: 'translate(0, 0)', opacity: 1 }, { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`, opacity: 0 }], { duration: 400 }).onfinish = () => p.remove();
            container.appendChild(p);
        }
    }

    document.getElementById('mode-cursor').onclick = () => initGame('cursor');
    document.getElementById('mode-tap').onclick = () => initGame('tap');
    pauseBtn.onclick = () => {
        isPaused = true;
        pauseOverlay.classList.remove('hidden');
        document.querySelectorAll('.target').forEach(t => t.classList.add('hidden'));
    };
    document.getElementById('resume-btn').onclick = () => {
        isPaused = false;
        pauseOverlay.classList.add('hidden');
        document.querySelectorAll('.target').forEach(t => t.classList.remove('hidden'));
    };
    document.getElementById('back-btn').onclick = () => {
        endGame();
        document.getElementById('title').textContent = "Target Challenge";
        document.getElementById('message').textContent = "ミスは-50点！UIを避けて出現します";
    };
});
</script>
</body>
</html>
