<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mode Select Shooter</title>
    <style>
        :root {
            --primary: #38bdf8;
            --accent: #fb7185;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* UI表示 */
        #ui {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }

        .stat {
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(15, 23, 42, 0.7);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 8px;
            display: inline-block;
        }

        /* モード選択・リザルト画面 */
        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(7, 10, 20, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            text-align: center;
        }

        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary); }
        .description { margin-bottom: 2rem; color: #94a3b8; }

        .mode-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            width: 160px;
        }

        .mode-card:hover {
            border-color: var(--primary);
            background: #334155;
            transform: translateY(-5px);
        }

        .mode-card h3 { margin: 0 0 10px 0; color: #f1f5f9; }
        .mode-card p { font-size: 0.8rem; margin: 0; color: #94a3b8; }

        /* ターゲット */
        .target {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, var(--accent) 10%, #be123c 90%);
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: var(--accent);
            border-radius: 50%;
            pointer-events: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui" class="hidden">
        <div class="stat">Time: <span id="timer">60</span>s</div><br>
        <div class="stat">Score: <span id="score">0</span></div>
    </div>

    <div id="overlay">
        <h1 id="title">Shooting Challenge</h1>
        <p id="message" class="description">デバイスに合わせてモードを選択してください</p>
        
        <div id="mode-selection" class="mode-container">
            <div class="mode-card" onclick="startGame('cursor')">
                <h3>カーソル</h3>
                <p>表示: 5秒<br>PC向け</p>
            </div>
            <div class="mode-card" onclick="startGame('tap')">
                <h3>タップ</h3>
                <p>表示: 2秒<br>スマホ向け</p>
            </div>
        </div>

        <button id="retry-btn" class="hidden" style="margin-top: 20px; padding: 12px 30px; border-radius: 30px; border:none; background: var(--primary); color:white; font-weight:bold; cursor:pointer;">
            もう一度プレイ
        </button>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const scoreElement = document.getElementById('score');
    const timerElement = document.getElementById('timer');
    const overlay = document.getElementById('overlay');
    const modeSelection = document.getElementById('mode-selection');
    const retryBtn = document.getElementById('retry-btn');
    const ui = document.getElementById('ui');

    let score = 0;
    let timeLeft = 60;
    let gameActive = false;
    let targetLifeTime = 5000; // デフォルト5秒
    let spawnInterval, countdownInterval;

    function startGame(mode) {
        // モード設定
        if (mode === 'cursor') {
            targetLifeTime = 5000;
            container.style.cursor = 'crosshair';
        } else {
            targetLifeTime = 2000;
            container.style.cursor = 'default';
        }

        // 初期化
        score = 0;
        timeLeft = 60;
        gameActive = true;
        scoreElement.textContent = score;
        timerElement.textContent = timeLeft;
        
        overlay.classList.add('hidden');
        ui.classList.remove('hidden');

        // ゲームループ
        spawnInterval = setInterval(() => {
            if (gameActive) createTarget();
        }, 700);

        countdownInterval = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function createTarget() {
        const target = document.createElement('div');
        target.classList.add('target');

        // 画面端で切れないように配置
        const x = Math.random() * (window.innerWidth - 80) + 10;
        const y = Math.random() * (window.innerHeight - 80) + 10;
        target.style.left = `${x}px`;
        target.style.top = `${y}px`;

        // 制限時間の視覚化（おまけ：少しずつ小さくなる）
        target.animate([
            { transform: 'scale(1)', opacity: 1 },
            { transform: 'scale(0.5)', opacity: 0.5 }
        ], { duration: targetLifeTime });

        const timeout = setTimeout(() => {
            if (target.parentNode) target.remove();
        }, targetLifeTime);

        // クリック/タップイベント
        const hitHandler = (e) => {
            if (!gameActive) return;
            e.preventDefault();
            e.stopPropagation();
            
            clearTimeout(timeout);
            
            // 座標取得（マウスとタッチ両対応）
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            createExplosion(clientX, clientY);
            target.remove();
            
            score += 100;
            scoreElement.textContent = score;
        };

        target.addEventListener('mousedown', hitHandler);
        target.addEventListener('touchstart', hitHandler, {passive: false});

        container.appendChild(target);
    }

    function createExplosion(x, y) {
        for (let i = 0; i < 12; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.left = `${x}px`;
            p.style.top = `${y}px`;
            
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 100 + 20;
            
            p.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`, opacity: 0 }
            ], { duration: 500, easing: 'ease-out' }).onfinish = () => p.remove();
            
            container.appendChild(p);
        }
    }

    function endGame() {
        gameActive = false;
        clearInterval(spawnInterval);
        clearInterval(countdownInterval);
        
        document.querySelectorAll('.target').forEach(t => t.remove());

        document.getElementById('title').textContent = "Finish!";
        document.getElementById('message').textContent = `Score: ${score}`;
        modeSelection.classList.remove('hidden');
        retryBtn.classList.add('hidden'); // モード選択に戻る形式
        overlay.classList.remove('hidden');
        ui.classList.add('hidden');
    }
</script>
</body>
</html>
