<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shooting Challenge Gold</title>
    <style>
        :root {
            --primary: #38bdf8;
            --accent: #fb7185;
            --warning: #fbbf24;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* UI表示 */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .stat {
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(15, 23, 42, 0.8);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            display: inline-block;
            min-width: 100px;
        }

        /* 一時停止ボタン（ターゲット出現禁止エリア） */
        #pause-btn {
            pointer-events: auto;
            background: #334155;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s;
        }
        #pause-btn:hover { background: #475569; }

        /* 中央カウントダウン */
        #central-countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12rem;
            font-weight: 900;
            color: var(--warning);
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
        }

        /* オーバーレイ */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(7, 10, 20, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            text-align: center;
        }

        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary); }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .menu-btn {
            padding: 12px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .primary-btn { background: var(--primary); color: white; }
        .secondary-btn { background: #475569; color: white; }

        .mode-container { display: flex; gap: 20px; margin-top: 20px; }
        .mode-card {
            background: #1e293b; padding: 20px; border-radius: 16px;
            border: 2px solid transparent; cursor: pointer; width: 140px;
        }
        .mode-card:hover { border-color: var(--primary); }

        /* ターゲット */
        .target {
            position: absolute;
            width: 60px; height: 60px;
            background: radial-gradient(circle, var(--accent) 10%, #be123c 90%);
            border-radius: 50%; border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.4);
            z-index: 10;
        }

        .hidden { display: none !important; }
        
        /* カウントダウンアニメーション */
        .ping { animation: ping-anim 0.5s ease-out forwards; }
        @keyframes ping-anim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        /* スコア減点時の赤フラッシュ */
        .minus-score { color: var(--danger); transition: color 0.2s; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui" class="hidden">
        <div>
            <div class="stat">Time: <span id="timer">60</span>s</div>
            <div class="stat">Score: <span id="score">0</span></div>
        </div>
        <button id="pause-btn">一時停止</button>
    </div>

    <div id="central-countdown"></div>

    <div id="menu-overlay" class="overlay">
        <h1 id="title">Target Challenge</h1>
        <p id="message">ミスは-50点！慎重に狙え！</p>
        <div class="mode-container">
            <div class="mode-card" onclick="initGame('cursor')">
                <h3>カーソル</h3>
                <p>5秒表示<br>PC向け</p>
            </div>
            <div class="mode-card" onclick="initGame('tap')">
                <h3>タップ</h3>
                <p>2秒表示<br>スマホ向け</p>
            </div>
        </div>
    </div>

    <div id="pause-overlay" class="overlay hidden">
        <h1>PAUSED</h1>
        <div class="btn-group">
            <button class="menu-btn primary-btn" onclick="resumeGame()">再開する</button>
            <button class="menu-btn secondary-btn" onclick="backToMenu()">タイトルへ</button>
        </div>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const scoreElement = document.getElementById('score');
    const timerElement = document.getElementById('timer');
    const centralCountdown = document.getElementById('central-countdown');
    const pauseBtn = document.getElementById('pause-btn');
    
    const menuOverlay = document.getElementById('menu-overlay');
    const pauseOverlay = document.getElementById('pause-overlay');
    const ui = document.getElementById('ui');

    let score = 0;
    let timeLeft = 60;
    let gameActive = false;
    let isPaused = false;
    let targetLifeTime = 5000;
    let spawnTimer, clockTimer;

    function initGame(mode) {
        targetLifeTime = (mode === 'cursor') ? 5000 : 2000;
        container.style.cursor = (mode === 'cursor') ? 'crosshair' : 'default';
        score = 0;
        timeLeft = 60;
        updateScore(0);
        timerElement.textContent = timeLeft;
        menuOverlay.classList.add('hidden');
        ui.classList.remove('hidden');
        startGameLoop();
    }

    function startGameLoop() {
        gameActive = true;
        isPaused = false;
        spawnTimer = setInterval(() => {
            if (gameActive && !isPaused) createTarget();
        }, 800);
        clockTimer = setInterval(() => {
            if (gameActive && !isPaused) {
                timeLeft--;
                timerElement.textContent = timeLeft;
                if (timeLeft <= 10 && timeLeft > 0) showCentralCountdown(timeLeft);
                if (timeLeft <= 0) endGame();
            }
        }, 1000);
    }

    function createTarget() {
        const target = document.createElement('div');
        target.classList.add('target');

        const targetSize = 60;
        const padding = 20;
        
        // 一時停止ボタンの領域を取得して、そこを避ける
        const btnRect = pauseBtn.getBoundingClientRect();
        const safeMargin = 20; // ボタンの周りの余白
        
        let x, y, isOverlapping;
        let attempts = 0;

        do {
            x = Math.random() * (window.innerWidth - targetSize - padding * 2) + padding;
            y = Math.random() * (window.innerHeight - targetSize - padding * 2) + padding;
            
            // ボタンの矩形領域とターゲットの矩形領域が重なっているか判定
            isOverlapping = (
                x < btnRect.right + safeMargin &&
                x + targetSize > btnRect.left - safeMargin &&
                y < btnRect.bottom + safeMargin &&
                y + targetSize > btnRect.top - safeMargin
            );
            attempts++;
        } while (isOverlapping && attempts < 10); // 無限ループ防止

        target.style.left = `${x}px`;
        target.style.top = `${y}px`;

        target.animate([
            { transform: 'scale(1)', opacity: 1 },
            { transform: 'scale(0.5)', opacity: 0 }
        ], { duration: targetLifeTime });

        const timeout = setTimeout(() => {
            if (target.parentNode) {
                target.remove();
                if (gameActive && !isPaused) {
                    updateScore(-50); // ミス減点
                }
            }
        }, targetLifeTime);

        const hitHandler = (e) => {
            if (!gameActive || isPaused) return;
            e.preventDefault();
            clearTimeout(timeout);
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            createExplosion(clientX, clientY);
            target.remove();
            updateScore(100); // 命中加点
        };

        target.addEventListener('mousedown', hitHandler);
        target.addEventListener('touchstart', hitHandler, {passive: false});
        container.appendChild(target);
    }

    function updateScore(points) {
        score += points;
        scoreElement.textContent = score;
        
        // 減点時に一瞬赤くする演出
        if (points < 0) {
            scoreElement.classList.add('minus-score');
            setTimeout(() => scoreElement.classList.remove('minus-score'), 300);
        }
    }

    function showCentralCountdown(num) {
        centralCountdown.textContent = num;
        centralCountdown.classList.remove('ping');
        void centralCountdown.offsetWidth;
        centralCountdown.classList.add('ping');
    }

    function pauseGame() {
        if (!gameActive || isPaused) return;
        isPaused = true;
        pauseOverlay.classList.remove('hidden');
        document.querySelectorAll('.target').forEach(t => t.style.display = 'none');
    }

    function resumeGame() {
        isPaused = false;
        pauseOverlay.classList.add('hidden');
        document.querySelectorAll('.target').forEach(t => t.style.display = 'block');
    }

    function backToMenu() {
        endGame();
        menuOverlay.classList.remove('hidden');
        document.getElementById('title').textContent = "Target Challenge";
        document.getElementById('message').textContent = "モードを選択してスタート";
    }

    function endGame() {
        gameActive = false;
        clearInterval(spawnTimer);
        clearInterval(clockTimer);
        document.querySelectorAll('.target').forEach(t => t.remove());
        ui.classList.add('hidden');
        pauseOverlay.classList.add('hidden');
        menuOverlay.classList.remove('hidden');
        document.getElementById('title').textContent = "Finish!";
        document.getElementById('message').textContent = `最終スコア: ${score}`;
    }

    function createExplosion(x, y) {
        for (let i = 0; i < 10; i++) {
            const p = document.createElement('div');
            p.style.cssText = `position:absolute; width:6px; height:6px; background:var(--accent); border-radius:50%; left:${x}px; top:${y}px; pointer-events:none; z-index:11;`;
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 80;
            p.animate([
                { transform: 'translate(0, 0)', opacity: 1 },
                { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`, opacity: 0 }
            ], { duration: 400 }).onfinish = () => p.remove();
            container.appendChild(p);
        }
    }

    pauseBtn.addEventListener('click', pauseGame);
</script>
</body>
</html>
