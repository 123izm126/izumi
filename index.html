<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Target Challenge - Secret Mode</title>
    <style>
        :root {
            --primary: #38bdf8;
            --accent: #fb7185;
            --warning: #fbbf24;
            --danger: #ef4444;
            --dark: #0f172a;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--dark);
            font-family: 'Segoe UI', sans-serif;
            color: white; user-select: none; touch-action: manipulation;
        }

        #game-container { position: relative; width: 100vw; height: 100vh; transition: background 0.5s; }

        /* UI */
        #ui { position: absolute; top: 20px; left: 20px; right: 20px; z-index: 100; display: flex; justify-content: space-between; pointer-events: none; }
        .stat { font-size: 1.2rem; font-weight: bold; background: rgba(15, 23, 42, 0.8); padding: 8px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); display: inline-block; min-width: 100px; margin-bottom: 5px; }
        #pause-btn { pointer-events: auto; background: #334155; border: 2px solid rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }

        /* メニュー */
        .overlay { position: absolute; inset: 0; background: rgba(7, 10, 20, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; text-align: center; }
        #title { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary); cursor: help; }
        .mode-container { display: flex; gap: 15px; margin-top: 20px; }
        .mode-card { background: #1e293b; padding: 15px; border-radius: 16px; border: 2px solid transparent; cursor: pointer; width: 110px; transition: 0.2s; }
        .mode-card:hover { border-color: var(--primary); background: #334155; }
        
        /* 裏モード用スタイル */
        .secret-btn { background: #4c1d95 !important; border-color: #8b5cf6 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        /* ターゲット */
        .target { position: absolute; width: 60px; height: 60px; background: radial-gradient(circle, var(--accent) 10%, #be123c 90%); border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 20px rgba(225, 29, 72, 0.4); z-index: 10; }
        .target.blackhole { background: radial-gradient(circle, #000 40%, #4c1d95 90%); border-color: #8b5cf6; width: 40px; height: 40px; }

        .hidden { display: none !important; }
        #central-countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10rem; font-weight: 900; color: var(--warning); opacity: 0; pointer-events: none; z-index: 50; }
        .ping { animation: ping-anim 0.5s ease-out forwards; }
        @keyframes ping-anim { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui" class="hidden">
        <div id="left-ui">
            <div class="stat">Time: <span id="timer">60</span>s</div><br>
            <div class="stat">Score: <span id="score">0</span></div>
        </div>
        <button id="pause-btn">一時停止</button>
    </div>

    <div id="central-countdown"></div>

    <div id="menu-overlay" class="overlay">
        <h1 id="title">Target Challenge</h1>
        <p id="message">ロゴを長押しすると...？</p>
        <div class="mode-container" id="normal-modes">
            <div class="mode-card" id="mode-cursor"><h3>カーソル</h3><p>5秒 / 0.8s</p></div>
            <div class="mode-card" id="mode-tap"><h3>タップ</h3><p>2秒 / 0.5s</p></div>
            <div class="mode-card hidden secret-btn" id="mode-secret"><h3>極限</h3><p>1秒 / 0.3s</p></div>
        </div>
    </div>

    <div id="pause-overlay" class="overlay hidden">
        <h1>PAUSED</h1>
        <div style="display:flex; flex-direction:column; gap:15px; margin-top:20px;">
            <button id="resume-btn" style="padding:12px 40px; background:var(--primary); border:none; color:white; border-radius:30px; font-weight:bold; cursor:pointer;">再開</button>
            <button id="back-btn" style="padding:12px 40px; background:#475569; border:none; color:white; border-radius:30px; font-weight:bold; cursor:pointer;">終了</button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('game-container');
    const scoreElement = document.getElementById('score');
    const timerElement = document.getElementById('timer');
    const titleElement = document.getElementById('title');
    const secretBtn = document.getElementById('mode-secret');
    const pauseBtn = document.getElementById('pause-btn');
    const menuOverlay = document.getElementById('menu-overlay');
    const pauseOverlay = document.getElementById('pause-overlay');
    const ui = document.getElementById('ui');

    let score = 0, timeLeft = 60, gameActive = false, isPaused = false;
    let targetLifeTime = 5000, spawnRate = 800, currentMode = 'normal';
    let spawnTimer, clockTimer, longPressTimer;

    // --- 裏モード解放ギミック ---
    const unlockSecret = () => {
        secretBtn.classList.remove('hidden');
        titleElement.style.color = '#8b5cf6';
        titleElement.textContent = "ABYSS MODE";
        document.getElementById('message').textContent = "裏モードが解放されました...";
    };

    titleElement.addEventListener('mousedown', () => { longPressTimer = setTimeout(unlockSecret, 3000); });
    titleElement.addEventListener('mouseup', () => clearTimeout(longPressTimer));
    titleElement.addEventListener('touchstart', () => { longPressTimer = setTimeout(unlockSecret, 3000); });
    titleElement.addEventListener('touchend', () => clearTimeout(longPressTimer));

    // --- ゲームロジック ---
    window.initGame = (mode) => {
        currentMode = mode;
        if (mode === 'cursor') { targetLifeTime = 5000; spawnRate = 800; }
        else if (mode === 'tap') { targetLifeTime = 2000; spawnRate = 500; }
        else if (mode === 'secret') { targetLifeTime = 1000; spawnRate = 300; } // 裏モード設定

        score = 0; timeLeft = 60;
        updateScore(0);
        menuOverlay.classList.add('hidden');
        ui.classList.remove('hidden');
        startGameLoop();
    };

    function startGameLoop() {
        gameActive = true; isPaused = false;
        spawnTimer = setInterval(() => { if (gameActive && !isPaused) createTarget(); }, spawnRate);
        clockTimer = setInterval(() => {
            if (gameActive && !isPaused) {
                timeLeft--; timerElement.textContent = timeLeft;
                if (timeLeft <= 10 && timeLeft > 0) showCountdown(timeLeft);
                if (timeLeft <= 0) endGame();
            }
        }, 1000);
    }

    function createTarget() {
        const target = document.createElement('div');
        target.classList.add('target');
        if (currentMode === 'secret') target.classList.add('blackhole');

        const btnRect = pauseBtn.getBoundingClientRect();
        const leftRect = document.getElementById('left-ui').getBoundingClientRect();
        
        let x, y, overlap, attempts = 0;
        do {
            x = Math.random() * (window.innerWidth - 80) + 20;
            y = Math.random() * (window.innerHeight - 80) + 20;
            overlap = [btnRect, leftRect].some(r => x < r.right + 20 && x + 60 > r.left - 20 && y < r.bottom + 20 && y + 60 > r.top - 20);
            attempts++;
        } while (overlap && attempts < 15);

        target.style.left = `${x}px`; target.style.top = `${y}px`;
        container.appendChild(target);

        target.animate([{ transform: 'scale(1)', opacity: 1 }, { transform: 'scale(0.5)', opacity: 0 }], { duration: targetLifeTime });

        const timeout = setTimeout(() => {
            if (target.parentNode) {
                target.remove();
                if (gameActive && !isPaused) updateScore(-50);
            }
        }, targetLifeTime);

        const hit = (e) => {
            if (!gameActive || isPaused) return;
            e.preventDefault(); clearTimeout(timeout);
            const cx = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const cy = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            createExplosion(cx, cy); target.remove();
            updateScore(currentMode === 'secret' ? 300 : 100);
        };
        target.addEventListener('mousedown', hit);
        target.addEventListener('touchstart', hit);
    }

    function updateScore(p) { score += p; scoreElement.textContent = score; }
    function showCountdown(n) { centralCountdown.textContent = n; centralCountdown.classList.remove('ping'); void centralCountdown.offsetWidth; centralCountdown.classList.add('ping'); }

    function endGame() {
        gameActive = false; clearInterval(spawnTimer); clearInterval(clockTimer);
        document.querySelectorAll('.target').forEach(t => t.remove());
        ui.classList.add('hidden'); pauseOverlay.classList.add('hidden'); menuOverlay.classList.remove('hidden');
        document.getElementById('title').textContent = "Finish!";
        document.getElementById('message').textContent = `Score: ${score}`;
    }

    function createExplosion(x, y) {
        for (let i = 0; i < 10; i++) {
            const p = document.createElement('div');
            p.style.cssText = `position:absolute; width:6px; height:6px; background:${currentMode==='secret'?'#8b5cf6':'#fb7185'}; border-radius:50%; left:${x}px; top:${y}px; pointer-events:none;`;
            const a = Math.random() * Math.PI * 2, d = Math.random() * 80;
            p.animate([{ transform: 'translate(0, 0)', opacity: 1 }, { transform: `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`, opacity: 0 }], { duration: 400 }).onfinish = () => p.remove();
            container.appendChild(p);
        }
    }

    document.getElementById('mode-cursor').onclick = () => initGame('cursor');
    document.getElementById('mode-tap').onclick = () => initGame('tap');
    document.getElementById('mode-secret').onclick = () => initGame('secret');
    pauseBtn.onclick = () => { isPaused = true; pauseOverlay.classList.remove('hidden'); };
    document.getElementById('resume-btn').onclick = () => { isPaused = false; pauseOverlay.classList.add('hidden'); };
    document.getElementById('back-btn').onclick = () => endGame();
});
</script>
</body>
</html>
