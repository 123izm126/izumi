<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shooting Challenge Gold</title>
    <style>
        :root {
            --primary: #38bdf8;
            --accent: #fb7185;
            --warning: #fbbf24;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* UI表示 */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .stat {
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(15, 23, 42, 0.8);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            display: inline-block;
            min-width: 100px;
        }

        /* 一時停止ボタン（ターゲット出現禁止エリア） */
        #pause-btn {
            pointer-events: auto;
            background: #334155;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s;
        }
        #pause-btn:hover { background: #475569; }

        /* 中央カウントダウン */
        #central-countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12rem;
            font-weight: 900;
            color: var(--warning);
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
        }

        /* オーバーレイ */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(7, 10, 20, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            text-align: center;
        }

        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary); }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .menu-btn {
            padding: 12px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .primary-btn { background: var(--primary); color: white; }
        .secondary-btn { background: #475569; color: white; }

        .mode-container { display: flex; gap: 20px; margin-top: 20px; }
        .mode-card {
            background: #1e293b; padding: 20px; border-radius: 16px;
            border: 2px solid transparent; cursor: pointer; width: 140px;
        }
